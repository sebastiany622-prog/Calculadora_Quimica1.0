<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fórmulas Químicas - Calculadora</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <a href="index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v2M15 3v2M3 8h18M5 8v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8M10 14h4"/></svg>
      Calculadora Química
    </a>
    <nav class="main-nav">
      <a href="index.html">Inicio</a>
      <a href="moles.html">Moles y Avogadro</a>
      <a href="masa_molar.html">Masa Molar</a>
      <a href="composicion.html">Composición</a>
      <a href="formula.html" class="active">Fórmula</a>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <h1>Fórmula Empírica y Molecular</h1>
      <p>Ingresa la composición porcentual de los elementos (enfocado a C, H, O para polímeros) para hallar las posibles fórmulas.</p>
    </div>

    <div class="calculator-interface">
      
      <div class="action-buttons" style="margin-bottom: 1rem;">
          <button class="action-btn" onclick="document.getElementById('pct-c').value=55.81; document.getElementById('pct-h').value=6.98; document.getElementById('pct-o').value=37.21; document.getElementById('target-mass').value=172.18;">Precargar datos de PBS</button>
      </div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
        <div class="form-group">
          <label>Carbono (C) %:</label>
          <input type="number" id="pct-c" placeholder="Ej: 55.81" step="0.01" min="0" max="100">
        </div>
        <div class="form-group">
          <label>Hidrógeno (H) %:</label>
          <input type="number" id="pct-h" placeholder="Ej: 6.98" step="0.01" min="0" max="100">
        </div>
        <div class="form-group">
          <label>Oxígeno (O) %:</label>
          <input type="number" id="pct-o" placeholder="Ej: 37.21" step="0.01" min="0" max="100">
        </div>
      </div>

      <div class="form-group">
        <label>Masa Molar Objetivo (g/mol) (Opcional, para f. molecular):</label>
        <input type="number" id="target-mass" placeholder="Ej: 172.18" step="0.01" min="0">
      </div>

      <button class="primary-btn" onclick="executeEmpiricalFormula()">Calcular Fórmulas</button>
    </div>

    <div class="results-area" id="results-section">
       <h2>Resultados</h2>
       <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-top: 1rem;">
           <div class="result-card">
             <h3>Fórmula Empírica</h3>
             <div class="value" id="result-empirical" style="color: var(--primary);">-</div>
           </div>
           <div class="result-card">
             <h3>Fórmula Molecular</h3>
             <div class="value" id="result-molecular" style="color: #357ABD;">-</div>
           </div>
       </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
